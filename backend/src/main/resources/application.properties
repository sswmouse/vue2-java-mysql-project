# Server configuration
server.port=3000
server.servlet.context-path=/
# Force UTF-8 encoding
spring.http.encoding.enabled=true
spring.http.encoding.charset=UTF-8
spring.http.encoding.force=true

# Spring Datasource (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/vue2_java_mysql?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&useUnicode=true&useLegacyDatetimeCode=false&allowPublicKeyRetrieval=true&zeroDateTimeBehavior=CONVERT_TO_NULL&connectionCollation=utf8mb4_general_ci
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# HikariCP - Execute SET NAMES on each new connection
spring.datasource.hikari.connection-init-sql=SET NAMES utf8
spring.datasource.hikari.maximum-pool-size=1
spring.datasource.hikari.cacheDefaultTimezone=false

# DNF API Configuration
dnf.api.base-url=https://dnf.qq.com
dnf.api.role-query-url=/cp/a20220322role/index.html
dnf.api.enabled=false
dnf.api.mock-mode=true

# JPA configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
# Force UTF-8 for character handling
spring.jpa.properties.hibernate.connection.characterEncoding=UTF-8
spring.jpa.properties.hibernate.connection.useUnicode=true
# Execute SET NAMES on connection init
spring.jpa.properties.hibernate.connection.init_sql=SET NAMES utf8

# Logging
logging.level.com.example.demo=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# File upload configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB
spring.servlet.multipart.file-size-threshold=0